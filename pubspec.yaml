name: smartsign_tv
description: SmartSign TV Player - Offline-First Digital Signage Player for Android TV

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  firebase_core: ^2.27.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0
  
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.0
  
  media_kit: ^0.0.10
  media_kit_libs_android_video: ^1.0.4
  
  dio: ^5.3.1
  connectivity_plus: ^5.0.0
  
  wakelock_plus: ^1.1.0
  
  get_it: ^7.6.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  uuid: ^4.0.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  
  logger: ^2.1.0
  sentry_flutter: ^7.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0
  isar_generator: ^3.1.0
  freezed: ^2.4.1
  mockito: ^5.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
